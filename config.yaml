bot:
  loop_interval_seconds: 30
  warmup_duration_seconds: 60
  historical_kline_limit: 200
  timezone: "Asia/Kolkata"

account:
  size_usdt: 5000.0
  max_risk_per_trade_percent: 3.0
  max_daily_loss_percent: 5.0
  max_open_trades: 5
  max_notional_per_trade_percent: 20.0

trading:
  start_hour_ist: 9
  end_hour_ist: 0
  symbols:
    tier_s: ["BTCUSDT", "ETHUSDT"]
    tier_a: ["SOLUSDT", "BNBUSDT", "XRPUSDT", "DOGEUSDT", "ADAUSDT"]
    tier_b: ["PEPEUSDT", "WIFUSDT", "ARBUSDT", "OPUSDT"]
  rotation_interval_hours: 4

strategies:
  regime_filter:
    enabled: true
    weight: 0.0
    adx_threshold_trending: 25.0
    adx_threshold_ranging: 20.0
    atr_multiplier_volatile: 1.5
    atr_lookback_periods: 20
  oi_breakout:
    enabled: true
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 2.0
    oi_std_dev_multiplier: 2.0
    oi_lookback_period: 20
    price_break_period: 20
  funding_squeeze:
    enabled: true
    weight: 1.0
    sl_percent: 0.5
    tp_percent: 1.0
    extreme_negative_threshold: -0.0005
    extreme_positive_threshold: 0.0005
  hyperliquid_leadlag:
    enabled: true
    weight: 1.2
    sl_percent: 0.1
    tp_percent: 0.3
    divergence_threshold: 0.0015
  cvd_divergence:
    enabled: true
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 2.0
    lookback_bars: 30
    min_divergence_bars: 5
  vwap_reversion:
    enabled: true
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 1.0
    deviation_threshold: 0.008
  spot_accumulation:
    enabled: true
    weight: 0.8
    sl_percent: 1.0
    tp_percent: 2.0
    volume_spike_multiplier: 2.5
    lookback_period: 20
  liquidation_fade:
    enabled: true
    weight: 0.9
    sl_percent: 0.5
    tp_percent: 1.0
    min_liquidation_usd: 500000
    fade_window_seconds: 120
  social_fade:
    enabled: true
    weight: 0.7
    sl_percent: 1.0
    tp_percent: 2.0
    greed_threshold: 80
    fear_threshold: 20
  dex_cex_arb:
    enabled: true
    weight: 1.0
    sl_percent: 0.3
    tp_percent: 0.6
    funding_diff_threshold: 0.0003
  post_settlement:
    enabled: true
    weight: 0.8
    sl_percent: 1.0
    tp_percent: 1.5
    lookback_hours: 4
    target_percent: 0.015
  tokenized_security:
    enabled: true
    weight: 0.6
    sl_percent: 1.0
    tp_percent: 2.0
    correlation_threshold: 0.6
    correlation_period: 24
  liquidation_cascade:
    enabled: true
    weight: 1.1
    sl_percent: 1.0
    tp_percent: 3.0
    min_liquidation_usd: 2000000
    cascade_window_seconds: 60
  market_maker_pnl:
    enabled: true
    weight: 0.7
    sl_percent: 1.0
    tp_percent: 2.0
    pnl_divergence_threshold: 15.0
  sector_rotation:
    enabled: true
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 2.0
    relative_strength_threshold: 0.02
  absorption_detection:
    enabled: true
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 2.0
    volume_spike_multiplier: 3.0
    max_price_move_percent: 0.1
    lookback_bars: 20
  onchain_liq:
    enabled: false
    weight: 1.0
    sl_percent: 1.0
    tp_percent: 2.0
    proximity_threshold: 0.005
    min_cluster_size: 5000000
  etf_flow:
    enabled: false
    weight: 1.0
    sl_percent: 0.5
    tp_percent: 1.0
    positive_threshold: 50000000
    negative_threshold: -50000000
  stablecoin_flow:
    enabled: false
    weight: 1.0
    sl_percent: 0.5
    tp_percent: 1.0
    min_flow_value: 30000000

phase2_strategies:
  lead_lag:
    enabled: true
    weight: 1.2
    sl_percent: 0.2
    tp_percent: 0.4
    divergence_threshold: 0.0015
    velocity_threshold: 0.0005
    cooldown_seconds: 120
    volume_confirmation: true
  liquidity_flow:
    enabled: true
    weight: 1.0
    sl_percent: 0.5
    tp_percent: 1.0
    wall_size_multiplier: 5.0
    min_wall_notional: 500000
    price_proximity_percent: 1.0

meta_strategy:
  consensus_threshold_percent: 60.0
  min_contributing_strategies: 2
  regime_weight_modifiers:
    trending:
      oi_breakout: 1.5
      liquidation_cascade: 1.3
      vwap_reversion: 0.6
    ranging:
      vwap_reversion: 1.5
      absorption_detection: 1.3
      oi_breakout: 0.6
    volatile:
      funding_squeeze: 1.4
      liquidation_fade: 1.3
      social_fade: 1.2

risk:
  correlation_threshold: 0.85
  correlation_lookback_hours: 24
  regulatory_fud_pairs:
    - "XMRUSDT"
    - "ZECUSDT"
    - "DASHUSDT"
    - "SCRT"
    - "DUSK"
    - "BEAMGUSDT"
  correlation_groups:
    - ["BTCUSDT", "ETHUSDT"]
    - ["SOLUSDT", "AVAXUSDT"]
    - ["DOGEUSDT", "SHIBUSDT", "PEPEUSDT"]

phase2:
  news:
    enabled: true
    max_headline_age_hours: 4.0
    emergency_score_threshold: -7.0
    pause_duration_minutes: 60
    poll_interval_seconds: 120
    # Primary API (Paid/Optional)
    crypto_panic_api_key: ""
    # Free Fallback Sources (Bug #8 remediation)
    rss_feeds:
      - "https://feeds.feedburner.com/CoinDesk"
      - "https://cointelegraph.com/rss"
      - "https://cryptonews.com/news/feed/"
      - "https://news.bitcoin.com/feed/"
      - "https://decrypt.co/feed/"
      - "https://theblock.co/rss"
  whale:
    enabled: true
    bullish_threshold_usd: 20000000.0
    bearish_threshold_usd: 15000000.0
    whale_aligned_size_multiplier: 1.3
    whale_opposed_size_multiplier: 0.6
    window_seconds: 3600
    max_transactions: 2000

logging:
  level: "INFO"
  file: "logs/kavach.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  max_bytes: 10485760
  backup_count: 5